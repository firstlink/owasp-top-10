  <line x1="1120" y1="290" x2="1120" y2="336" stroke="#4452b8" stroke-width="4.5" marker-end="url(#ar)"/>
  <line x1="1010" y1="458" x2="900" y2="458" stroke="#2d6a4f" stroke-width="4.5" marker-end="url(#ar)"/>
  <line x1="680" y1="436" x2="570" y2="436" stroke="#2d6a4f" stroke-width="4.5" marker-end="url(#ar)"/>
  <line x1="460" y1="514" x2="460" y2="620" stroke="#2d6a4f" stroke-width="4.5" marker-end="url(#ar)"/>
  <line x1="590" y1="755" x2="680" y2="755" stroke="#2d6a4f" stroke-width="4.5" marker-end="url(#ar)"/>
  <line x1="900" y1="755" x2="1010" y2="755" stroke="#2d6a4f" stroke-width="4.5" marker-end="url(#ar)"/>
  <line x1="1120" y1="778" x2="1120" y2="960" stroke="#2d6a4f" stroke-width="4.5" marker-end="url(#ar)"/>
  <line x1="1120" y1="1052" x2="1120" y2="1100" stroke="#2d6a4f" stroke-width="4.5" marker-end="url(#ar)"/>

  <rect x="70" y="170" width="170" height="120" rx="20" fill="#fcfbf8" stroke="#aba294" stroke-width="2.5"/>
  <text x="155" y="220" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#38342f">User</text>
  <text x="155" y="252" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#6b655c">Operator / business lead</text>
  <text x="155" y="276" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#8a847b">"complete the approved task"</text>

  <rect x="350" y="160" width="220" height="146" rx="20" fill="#f7f8ff" stroke="#4452b8" stroke-width="2.8"/>
  <text x="460" y="220" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#33429f">Agent planner</text>
  <text x="460" y="252" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#5360be">Execution draft under review</text>
  <rect x="372" y="270" width="176" height="32" rx="10" fill="#edf7f0" stroke="#bdddc8" stroke-width="1.2"/>
  <text x="460" y="292" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#2d6a4f">Goal: safe code execution ✓</text>

  <rect x="680" y="160" width="220" height="130" rx="20" fill="#fcfbf8" stroke="#aba294" stroke-width="2.5"/>
  <text x="790" y="222" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#38342f">generateOrCompileCode()</text>
  <text x="790" y="252" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#6b655c">Shell / SQL / Python draft builder</text>
  <text x="790" y="282" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#8a847b">turns task context into executable drafts</text>

  <rect x="1010" y="160" width="220" height="130" rx="20" fill="#fcfbf8" stroke="#aba294" stroke-width="2.5"/>
  <text x="1120" y="214" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#38342f">Untrusted input</text>
  <text x="1120" y="246" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#6b655c">Files / queries / records</text>
  <text x="1120" y="274" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#8a847b">data may try to become code</text>

  <rect x="1010" y="336" width="220" height="250" rx="20" fill="#fdf0f0" stroke="#b87a45" stroke-width="2.3"/>
  <text x="1120" y="378" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#8d3f2f">Attack patterns</text>
  <text x="1120" y="434" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11.5" fill="#a04d3a"><tspan x="1120" dy="0">Shell injection: cleanup or repair</tspan><tspan x="1120" dy="13.569999999999999">code escapes the approved path</tspan></text>
  <text x="1120" y="494" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9.5" fill="#a04d3a"><tspan x="1120" dy="0">SQL injection: natural language becomes</tspan><tspan x="1120" dy="11.209999999999999">destructive multi-statement SQL</tspan></text>
  <text x="1120" y="554" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" fill="#a04d3a"><tspan x="1120" dy="0">Data-to-code escape: uploaded text</tspan><tspan x="1120" dy="12.389999999999999">breaks into generated Python</tspan></text>

  
    <rect x="680" y="356" width="240" height="186" rx="20" fill="#edf7f0" stroke="#2d6a4f" stroke-width="2.8"/>
    <text x="710" y="386" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="800" fill="#2d6a4f">D1</text>
    <text x="800" y="392" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#24553f"><tspan x="800" dy="0">Input sanitisation &amp;</tspan><tspan x="800" dy="18.24">data classification</tspan></text>
    <text x="800" y="450.48" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" fill="#3d735a"><tspan x="800" dy="0">Classify all ingested content</tspan><tspan x="800" dy="12.075">as data before reasoning.</tspan></text>
    <text x="800" y="492.63" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9.5" fill="#56826c"><tspan x="800" dy="0">Shell, SQL, and subprocess</tspan><tspan x="800" dy="10.924999999999999">markers are quarantined early.</tspan></text>
  
  
    <rect x="350" y="356" width="240" height="186" rx="20" fill="#eef1ff" stroke="#4452b8" stroke-width="2.8"/>
    <text x="380" y="386" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="800" fill="#4452b8">D2</text>
    <text x="470" y="392" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#33429f"><tspan x="470" dy="0">Code generation</tspan><tspan x="470" dy="19.38">static analysis</tspan></text>
    <text x="470" y="452.76" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" fill="#5360be"><tspan x="470" dy="0">Treat every script, query, or</tspan><tspan x="470" dy="12.075">plan as a draft until checked.</tspan></text>
    <text x="470" y="494.90999999999997" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9.5" fill="#6b77cb"><tspan x="470" dy="0">Unsafe deletion scope, raw SQL,</tspan><tspan x="470" dy="10.924999999999999">and process calls are rejected.</tspan></text>
  
  
    <rect x="350" y="662" width="240" height="186" rx="20" fill="#edf7f0" stroke="#2d6a4f" stroke-width="2.8"/>
    <text x="380" y="692" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="800" fill="#2d6a4f">D3</text>
    <text x="470" y="698" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#24553f"><tspan x="470" dy="0">Hardware-enforced</tspan><tspan x="470" dy="17.099999999999998">sandbox execution</tspan></text>
    <text x="470" y="754.2" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" fill="#3d735a"><tspan x="470" dy="0">Run generated code in a</tspan><tspan x="470" dy="12.075">zero-access isolated runtime.</tspan></text>
    <text x="470" y="796.35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9.5" fill="#56826c"><tspan x="470" dy="0">Filesystem, database, and</tspan><tspan x="470" dy="10.924999999999999">network reach stay tightly…</tspan></text>
  
  
    <rect x="680" y="662" width="240" height="186" rx="20" fill="#edf7f0" stroke="#2d6a4f" stroke-width="2.8"/>
    <text x="710" y="692" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="800" fill="#2d6a4f">D4</text>
    <text x="800" y="698" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#24553f"><tspan x="800" dy="0">Dry-run validation</tspan></text>
    <text x="800" y="739.38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" fill="#3d735a"><tspan x="800" dy="0">Preview state changes</tspan><tspan x="800" dy="12.075">before destructive execution.</tspan></text>
    <text x="800" y="781.53" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11.5" fill="#56826c"><tspan x="800" dy="0">Unexpected files, rows, or</tspan><tspan x="800" dy="13.225">endpoints halt the run.</tspan></text>
  
  
    <rect x="1010" y="662" width="240" height="186" rx="20" fill="#edf7f0" stroke="#2d6a4f" stroke-width="2.8"/>
    <text x="1040" y="692" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="800" fill="#2d6a4f">D5</text>
    <text x="1130" y="698" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#24553f"><tspan x="1130" dy="0">Human- in- the-</tspan><tspan x="1130" dy="19.38">Loop Gate</tspan></text>
    <text x="1130" y="758.76" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11.5" fill="#3d735a"><tspan x="1130" dy="0">Deletes, production writes,</tspan><tspan x="1130" dy="13.225">and sends require approval.</tspan></text>
    <text x="1130" y="803.21" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9.5" fill="#56826c"><tspan x="1130" dy="0">The agent cannot self-authorize</tspan><tspan x="1130" dy="10.924999999999999">destructive code paths.</tspan></text>
  

  <rect x="980" y="960" width="280" height="92" rx="18" fill="#edf7f0" stroke="#2d6a4f" stroke-width="2.8"/>
  <text x="1120" y="992" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#24553f">Approved execution outcome</text>
  <text x="1120" y="1020" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#3d735a"><tspan x="1120" dy="0">Only the reviewed, bounded execution</tspan><tspan x="1120" dy="14.499999999999998">path is allowed through.</tspan></text>
  <text x="1120" y="1044" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11.5" fill="#56826c"><tspan x="1120" dy="0">Correct scope, correct interface, correct</tspan><tspan x="1120" dy="13.11">runtime.</tspan></text>

  <rect x="60" y="1100" width="1280" height="28" rx="14" fill="#edf7f0" stroke="#9ec1ae" stroke-width="1.8"/>
  <text x="86" y="1117" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="800" fill="#2d6a4f">D6 - Strong Observability</text>
  <text x="374" y="1117" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" fill="#56826c"><tspan x="374" dy="0">Telemetry spans ingested data, code drafts, static checks, dry-runs, sandbox events, and approval steps.</tspan></text>

  <text x="295" y="194" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#4452b8"><tspan x="295" dy="0">① Request enters</tspan></text>
  <text x="625" y="194" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#4452b8"><tspan x="625" dy="0">② Generate execution draft</tspan></text>
  <text x="955" y="186" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#4452b8"><tspan x="955" dy="0">③ Read untrusted input</tspan></text>
  <text x="1120" y="294.805" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="700" fill="#4452b8"><tspan x="1120" dy="0">④ Code-risk patterns are</tspan><tspan x="1120" dy="12.389999999999999">identified</tspan></text>
  <text x="955" y="426" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="700" fill="#2d6a4f"><tspan x="955" dy="0">⑤ Classify as data only</tspan></text>
  <text x="625" y="406" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="700" fill="#2d6a4f"><tspan x="625" dy="0">⑥ Statically analyze draft</tspan></text>
  <text x="460" y="572" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="700" fill="#2d6a4f"><tspan x="460" dy="0">⑦ Run in hardware sandbox</tspan></text>
  <text x="635" y="725" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="700" fill="#2d6a4f"><tspan x="635" dy="0">⑧ Preview blast radius</tspan></text>
  <text x="965" y="725" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="700" fill="#2d6a4f"><tspan x="965" dy="0">⑨ Require approval</tspan></text>
  <text x="1120" y="865" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10.5" font-weight="700" fill="#2d6a4f"><tspan x="1120" dy="0">⑩ Execute approved path</tspan></text>
</svg>